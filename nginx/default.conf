server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed bundles: long cache is safe
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Screenshots share stable filenames; allow refresh when files are replaced
    location ^~ /screenshots/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|mjs|png|jpe?g|gif|ico|svg|webp|avif|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
