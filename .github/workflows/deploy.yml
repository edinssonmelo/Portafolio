name: Deploy to ai-server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-portafolio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, portafolio]
    steps:
      - name: Pull and deploy
        run: |
          cd /srv/apps/portafolio
          git pull --ff-only origin main
          echo "Deployed commit: $(git rev-parse --short HEAD): $(git log -1 --format=%s)"
          docker compose -p portafolio build
          docker compose -p portafolio up -d --remove-orphans

      - name: Verify container
        run: docker ps --filter name=portafolio-web --format '{{.Names}} {{.Status}}'
