name: Docker build

on:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          npm ci
          npm run build

      - name: Build Docker image
        run: docker build -t portafolio:ci .
